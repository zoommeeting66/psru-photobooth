# Render Blueprint — one-click deploy of the API + PostgreSQL.
# https://render.com/docs/blueprint-spec   →  New + → Blueprint → pick this repo.
#
# Deploys the FastAPI backend (Docker) with a managed Postgres and a persistent
# disk for the local storage backend. For multi-instance scale, switch to S3/R2
# (set STORAGE_BACKEND=s3 + S3_* envs) and remove the disk.
#
# Frontend: deploy to Vercel (root = frontend/, env NEXT_PUBLIC_API_BASE=<api url>)
# — easiest path for Next.js. See SETUP.md §Level 2.

databases:
  - name: psru-photobooth-db
    databaseName: photobooth
    user: psru
    plan: free

services:
  - type: web
    name: psru-photobooth-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: psru-photobooth-db
          property: connectionString   # postgres://… (app normalizes to asyncpg)
      - key: PUBLIC_BASE_URL
        sync: false                    # set to the service URL after first deploy
      - key: JWT_SECRET
        generateValue: true
      - key: AUTH_DEV_MODE
        value: "true"                  # set false + configure OIDC_* for real Keycloak
      - key: PIPELINE_MOCK
        value: "true"
      - key: STORAGE_BACKEND
        value: local                   # set to s3 + S3_* envs for object storage
      - key: STORAGE_DIR
        value: /app/data/storage
