name: E2E

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright Kiosk flow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Start backend (SQLite, mock pipeline)
        working-directory: backend
        run: |
          PUBLIC_BASE_URL=http://localhost:8000 \
          nohup uvicorn app.main:app --port 8000 > /tmp/backend.log 2>&1 &

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build & start frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
          nohup npx next start -p 3000 > /tmp/frontend.log 2>&1 &

      - name: Install Playwright + browser
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Wait for servers
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8000/api/v1/health > /dev/null \
              && curl -sf http://localhost:3000/ > /dev/null && exit 0
            sleep 1
          done
          echo "servers did not become ready"; cat /tmp/backend.log /tmp/frontend.log; exit 1

      - name: Run E2E
        working-directory: e2e
        run: node kiosk.e2e.mjs   # uses Playwright's installed Chromium (no CHROME_BIN)

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: e2e/artifacts/
          if-no-files-found: ignore
